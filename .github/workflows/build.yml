name: Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger build on version tag pushes (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Package and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Install Desktop Dependencies
        run: npm ci --prefix desktop

      - name: Compile Backend TypeScript
        run: npm run build:backend

      - name: Copy Backend to Desktop
        run: npm run copy-backend

      - name: Package Desktop Client
        run: npm run build:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To sign macOS app in CI, add code-signing secrets here when certificates are purchased
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
